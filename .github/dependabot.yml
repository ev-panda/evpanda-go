version: 2
updates:
  # klauspost/compress is intentionally kept current (latest) for zstd
  # security/perf fixes. A bump may raise the Go floor (its go.mod) — when
  # that happens, update go.mod `go`, the CI matrix, and the README.
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
